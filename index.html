            cues: ["Drive bar off shoulders, THEN split", "Push the bar straight to the ceiling", "Finish tall before you go down"],
            drills: ["Push press (#1 jerk assistance exercise)", "Jerk drives at 85–110% (full drive, re-rack)", "Power jerk (demands more bar elevation)"],
            barPath: null },
          { error: "Press-out (arms not locked at catch)", freq: "med",
            rootCause: "Insufficient bar elevation from legs (primary); delayed punch-under; limited shoulder mobility; lack of aggression",
            downstream: "No-lift / red lights in competition; unstable overhead; confidence erosion",
            cues: ["Punch the ceiling", "Push yourself DOWN, not the bar up", "Lock it NOW"],
            drills: ["All BTN variations (push press, power jerk, split jerk)", "Tall jerk (press to eye level, hold, drop under)", "Jerk from behind neck"],
            barPath: null },
          { error: "Asymmetric drive / bar tilts to one side", freq: "low",
            rootCause: "One arm stronger or more dominant; uneven rack creating uneven force application; asymmetric dip feeding into asymmetric drive; prior shoulder injury limiting one side",
            downstream: "Bar tilts overhead; one arm locks while other presses; lateral miss; consistently miss to same side; shoulder impingement risk",
            cues: ["Both arms punch at the same time", "Drive the bar level", "Equal push from both legs"],
            drills: ["Single-arm dumbbell push press (address imbalance)", "Jerk from behind neck (more symmetric rack)", "Pause jerk with hold overhead 3s (identify tilt)"],
            barPath: null },
          { error: "Feet leave floor unevenly / staggered timing", freq: "low",
            rootCause: "Asymmetric leg power; poor split foot timing drill work; one foot moves before drive is complete; rushing the split before finishing the drive",
            downstream: "Bar doesn't reach full height; uneven receiving base; one foot out of position; lateral instability",
            cues: ["Both feet move AFTER the drive", "Drive finishes, THEN split", "One rhythm — drive, split, lock"],
            drills: ["Power jerk (feet move symmetrically)", "Jerk drives to full extension (feet stay planted)", "Drop-to-split from standing (practice simultaneous foot movement)"],
            barPath: null }
        ]},
      { name: "The Split",
        errors: [
          { error: "Short front foot / insufficient split depth", freq: "med",
            rootCause: "Usually a DRIVE problem — insufficient bar elevation pushes athlete down before foot reaches; fear of committing",
            downstream: "Unstable receiving; pressing out; forward miss; inconsistency heavy",
            cues: ["Drive first, THEN split", "Reach front foot to a target (tape)", "Chest UP as you split"],
            drills: ["Jerk balance (only front foot moves)", "Drop-to-split (from standing)", "Jerk from pins (start in split, recover)"],
            barPath: null },
          { error: "Head/chest dives forward into split", freq: "med",
            rootCause: "Confuses 'get under' with 'lean forward'; hips left behind bar; may compensate for forward dip upstream",
            downstream: "Severe instability; bar forward of base; missed forward consistently",
            cues: ["Push UP through the bar as you split", "50/50 weight between both feet", "Bar stays over your ears"],
            drills: ["Jerk balance (Everett's Rx for head-diving)", "Tall jerk (no dip — pure punch-under)", "OH walking lunges in split position"],
            barPath: null },
          { error: "Back foot flat / straight leg / over-reaching", freq: "low",
            rootCause: "Incorrect split model; back knee should be slightly bent, ball of foot on floor, not flat",
            downstream: "Anterior pelvic tilt; lumbar hyperextension; forward lean; difficult recovery",
            cues: ["Soft back knee", "Ball of the back foot, not toes", "Front foot back FIRST to recover"],
            drills: ["Drop-to-split with position check", "Jerk recovery from pins (above-max)", "Split jerk + 3s hold before recovery"],
            barPath: null },
          { error: "Narrow split / feet too close together (front-to-back)", freq: "med",
            rootCause: "Insufficient confidence to commit to full split; drive problem upstream cutting split short; tight hip flexors limiting back leg range; fear of going deep",
            downstream: "High center of gravity in receiving; unstable base; pressing out to compensate; inconsistent heavy jerks",
            cues: ["Reach your front foot to a target", "Long split — own the position", "Front shin vertical, back knee bent"],
            drills: ["Jerk balance (isolates front foot reach)", "Drop-to-split with floor markers", "Walking lunges in jerk split position (build comfort at depth)"],
            barPath: null },
          { error: "Feet too narrow side-to-side (tightrope split)", freq: "low",
            rootCause: "Not maintaining hip-width base when splitting; feet track toward centerline instead of staying apart; common in athletes who don't practice split footwork",
            downstream: "Lateral instability; bar wobbles side to side; difficult to save any lateral displacement; consistently unstable overhead",
            cues: ["Hip-width feet — railroad tracks, not a tightrope", "Keep your feet apart as you split", "Split on two tracks, not one"],
            drills: ["Split jerk with tape lines for each foot", "Drop-to-split on parallel lines (hip width)", "Jerk balance focusing on lateral foot placement"],
            barPath: null }
        ]},
      { name: "Recovery",
        errors: [
          { error: "Wrong foot recovery order (back foot moves first)", freq: "med",
            rootCause: "Instinct to step back foot forward first; lack of practice; confusion about recovery sequence; rushing to stand up",
            downstream: "Base narrows before bar is secured; weight shifts forward onto front foot; loss of balance; dropped jerks after a solid split",
            cues: ["Front foot back FIRST, then back foot forward", "Half step back, half step forward, feet together", "Recover in two steps — front first"],
            drills: ["Split jerk + 3s hold then recover with coach calling feet", "Jerk recovery from pins (practice sequence under heavy load)", "Drop-to-split + recover (drill footwork without fatigue)"],
            barPath: null },
          { error: "Rushing recovery / standing up before bar is stable", freq: "med",
            rootCause: "Anxiety to finish the lift; not trusting the split position; judges' pressure in competition; lack of patience in overhead hold",
            downstream: "Bar drifts during recovery; press-out; loss of balance; turns made jerks into misses",
            cues: ["Stabilize first, THEN recover", "Own the split before you move", "Bar locked? Now recover slowly"],
            drills: ["Split jerk + 5s hold before any foot moves", "Jerk from pins with mandatory hold", "Behind-the-neck split jerk + hold"],
            barPath: null }
        ]}
    ]
  }
};

const ALL_ERRORS = Object.entries(LIFTS).flatMap(([liftKey, lift]) =>
  lift.phases.flatMap((phase, pi) =>
    phase.errors.map((err, ei) => ({
      ...err, liftKey, liftLabel: lift.label,
      phaseName: phase.name, phaseIndex: pi,
      id: `${liftKey}-${pi}-${ei}`
    }))
  )
);

const BAR_PATH_DEVIATIONS = [
  { id: "forward-off-floor", label: "Bar forward off floor", phase: "First Pull", cause: "Hips too high; yanking; poor start" },
  { id: "no-sweep-to-body", label: "Bar doesn't sweep toward body", phase: "First Pull", cause: "Lats disengaged; knees not clearing" },
  { id: "separates-at-knee", label: "Bar separates / doesn't return to hip", phase: "Transition", cause: "No scoop; torso opens early; lats disengage" },
  { id: "forward-loop-after-contact", label: "Forward loop after contact", phase: "Second Pull", cause: "Horizontal hip thrust; locked elbows; incomplete extension" },
  { id: "no-return-in-turnover", label: "Bar doesn't return in turnover", phase: "Third Pull", cause: "Passive turnover; no active pull-under" },
  { id: "caught-forward", label: "Bar caught forward of start", phase: "Catch", cause: "Upstream errors; poor posture; no bar direction" },
];

function SearchIcon() {
  return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>;
}

function ChevronIcon({ open }) {
  return <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"
    style={{ transform: open ? "rotate(90deg)" : "rotate(0deg)", transition: "transform 0.15s ease" }}><path d="m9 18 6-6-6-6"/></svg>;
}

function FreqDot({ freq }) {
  const colors = { high: "#c0392b", med: "#d4a017", low: "#7f8c8d" };
  const labels = { high: "Common", med: "Moderate", low: "Less common" };
  return (
    <span style={{ display: "inline-flex", alignItems: "center", gap: "4px", fontSize: "10px", color: colors[freq], fontWeight: 600 }}>
      <span style={{ width: 7, height: 7, borderRadius: "50%", background: colors[freq], display: "inline-block" }}/>
      {labels[freq]}
    </span>
  );
}

function ErrorCard({ item, isExpanded, onToggle, liftData, compact }) {
  const c = liftData;
  const cardRef = useRef(null);

  useEffect(() => {
    if (isExpanded && cardRef.current) {
      setTimeout(() => {
        cardRef.current.scrollIntoView({ behavior: "smooth", block: "nearest" });
      }, 60);
    }
  }, [isExpanded]);

  if (compact) {
    return (
      <div style={{
        background: "#fff", borderRadius: "8px", border: "1px solid #e2e6ed",
        padding: "12px 14px", marginBottom: "6px", borderLeft: `4px solid ${c.accent}`,
      }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: "8px" }}>
          <div style={{ fontSize: "13px", fontWeight: 700, color: "#1a1a2e", lineHeight: 1.3, flex: 1 }}>{item.error}</div>
          <FreqDot freq={item.freq} />
        </div>
        <div style={{
          marginTop: "8px", padding: "8px 12px", background: c.light,
          borderRadius: "6px", fontSize: "15px", fontWeight: 700,
          fontStyle: "italic", color: c.color, lineHeight: 1.3,
        }}>"{item.cues[0]}"</div>
        <div style={{ marginTop: "6px", fontSize: "11px", color: "#888" }}>
          {item.liftLabel} › {item.phaseName} &nbsp;|&nbsp; Top drill: {item.drills[0]}
        </div>
      </div>
    );
  }

  return (
    <div ref={cardRef} style={{
      background: "#fff", borderRadius: "10px",
      border: `1px solid ${isExpanded ? c.accent + "50" : "#e2e6ed"}`,
      marginBottom: "8px", overflow: "hidden",
      boxShadow: isExpanded ? `0 2px 12px ${c.accent}12` : "0 1px 2px rgba(0,0,0,0.03)",
      transition: "border-color 0.15s ease, box-shadow 0.15s ease",
      borderLeft: `4px solid ${c.accent}`,
    }}>
      <button onClick={onToggle} style={{
        width: "100%", display: "flex", alignItems: "center", gap: "10px",
        padding: "14px 14px", background: "transparent", border: "none",
        cursor: "pointer", textAlign: "left", minHeight: "48px",
      }}>
        <span style={{ color: c.accent, flexShrink: 0 }}><ChevronIcon open={isExpanded} /></span>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontSize: "14px", fontWeight: 700, color: "#1a1a2e", lineHeight: 1.3 }}>{item.error}</div>
          <div style={{ marginTop: "4px", display: "flex", alignItems: "center", gap: "8px", flexWrap: "wrap" }}>
            <span style={{ fontSize: "11px", color: "#888", fontWeight: 500 }}>{item.liftLabel} › {item.phaseName}</span>
            <FreqDot freq={item.freq} />
          </div>
        </div>
      </button>

      {isExpanded && (
        <div style={{ padding: "0 14px 16px 28px" }}>
          <div style={{ display: "grid", gap: "10px", gridTemplateColumns: "1fr", marginBottom: "12px" }}>
            <div style={{ background: "#fff8f0", borderRadius: "8px", padding: "10px 12px", border: "1px solid #b85c0015" }}>
              <div style={{ fontSize: "10px", fontWeight: 800, letterSpacing: "0.06em", color: "#b85c00", marginBottom: "4px" }}>ROOT CAUSE</div>
              <div style={{ fontSize: "13px", color: "#2c2c2c", lineHeight: 1.45 }}>{item.rootCause}</div>
            </div>
            <div style={{ background: "#fef5f5", borderRadius: "8px", padding: "10px 12px", border: "1px solid #c0392b12" }}>
              <div style={{ fontSize: "10px", fontWeight: 800, letterSpacing: "0.06em", color: "#c0392b", marginBottom: "4px" }}>DOWNSTREAM EFFECT</div>
              <div style={{ fontSize: "13px", color: "#2c2c2c", lineHeight: 1.45 }}>{item.downstream}</div>
            </div>
          </div>
          <div style={{ marginBottom: "12px" }}>
            <div style={{ fontSize: "10px", fontWeight: 800, letterSpacing: "0.06em", color: c.accent, marginBottom: "6px" }}>CUES</div>
            <div style={{ display: "flex", flexDirection: "column", gap: "5px" }}>
              {item.cues.map((cue, i) => (
                <div key={i} style={{
                  padding: "10px 14px", background: c.light, borderRadius: "8px",
                  border: `1px solid ${c.accent}20`,
                  fontSize: i === 0 ? "16px" : "14px",
                  fontWeight: 700, fontStyle: "italic", color: c.color, lineHeight: 1.25,
                }}>"{cue}"</div>
              ))}
            </div>
          </div>
          <div>
            <div style={{ fontSize: "10px", fontWeight: 800, letterSpacing: "0.06em", color: "#1a6b3a", marginBottom: "6px" }}>DRILLS (Priority Order)</div>
            <div style={{ background: "#f0faf5", borderRadius: "8px", padding: "10px 12px", border: "1px solid #1a6b3a12" }}>
              <ol style={{ margin: 0, paddingLeft: "16px", display: "flex", flexDirection: "column", gap: "4px" }}>
                {item.drills.map((drill, i) => (
                  <li key={i} style={{ fontSize: "13px", color: "#2c2c2c", lineHeight: 1.4 }}>{drill}</li>
                ))}
              </ol>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function App() {
  const [search, setSearch] = useState("");
  const [liftFilter, setLiftFilter] = useState("all");
  const [phaseFilter, setPhaseFilter] = useState("all");
  const [expandedIds, setExpandedIds] = useState(new Set());
  const [compact, setCompact] = useState(false);
  const [barPathFilter, setBarPathFilter] = useState(null);
  const [showBarPath, setShowBarPath] = useState(false);

  const toggleExpand = useCallback((id) => {
    setExpandedIds(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  }, []);

  const filteredErrors = useMemo(() => {
    const q = search.toLowerCase().trim();
    return ALL_ERRORS.filter(item => {
      if (liftFilter !== "all" && item.liftKey !== liftFilter) return false;
      if (phaseFilter !== "all" && !item.phaseName.toLowerCase().includes(phaseFilter)) return false;
      if (barPathFilter && item.barPath !== barPathFilter) return false;
      if (!q) return true;
      const searchable = [item.error, item.rootCause, item.downstream, ...item.cues, ...item.drills, item.barPath || ""].join(" ").toLowerCase();
      return q.split(/\s+/).every(w => searchable.includes(w));
    });
  }, [search, liftFilter, phaseFilter, barPathFilter]);

  const phases = useMemo(() => {
    if (liftFilter === "all") return [];
    return LIFTS[liftFilter].phases.map(p => p.name);
  }, [liftFilter]);

  return (
    <div style={{ minHeight: "100vh", background: "#f3f5f9" }}>
      <div style={{
        background: "linear-gradient(135deg, #1a2744 0%, #2c3e6b 60%, #4a3b6b 100%)",
        padding: "20px 16px 16px", color: "#fff",
        position: "sticky", top: 0, zIndex: 100,
        boxShadow: "0 2px 12px rgba(0,0,0,0.2)",
      }}>
        <div style={{ maxWidth: "960px", margin: "0 auto" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div>
              <h1 style={{ margin: 0, fontSize: "18px", fontWeight: 800, letterSpacing: "-0.01em" }}>Error Correction</h1>
              <p style={{ margin: "2px 0 0", fontSize: "11px", opacity: 0.55 }}>USAW · Root-Cause · FHSAA</p>
            </div>
            <button onClick={() => setCompact(!compact)} style={{
              padding: "7px 12px", borderRadius: "6px", fontSize: "11px", fontWeight: 700,
              border: "1px solid rgba(255,255,255,0.25)", cursor: "pointer",
              background: compact ? "rgba(255,255,255,0.2)" : "transparent", color: "#fff",
            }}>{compact ? "◉ Quick Cue" : "○ Quick Cue"}</button>
          </div>

          <div style={{ marginTop: "12px", position: "relative" }}>
            <span style={{ position: "absolute", left: "12px", top: "50%", transform: "translateY(-50%)", color: "#8090b0" }}><SearchIcon /></span>
            <input type="text" placeholder="Search errors, cues, drills..."
              value={search} onChange={e => { setSearch(e.target.value); setBarPathFilter(null); }}
              style={{
                width: "100%", padding: "12px 14px 12px 40px", borderRadius: "10px",
                border: "1px solid rgba(255,255,255,0.15)",
                background: "rgba(255,255,255,0.08)", color: "#fff", fontSize: "15px", boxSizing: "border-box",
              }}
            />
          </div>

          <div style={{ display: "flex", gap: "8px", marginTop: "10px" }}>
            {[{ key: "all", label: "All", col: "#fff" }, { key: "snatch", label: "Snatch", col: "#7eb3ff" }, { key: "clean", label: "Clean", col: "#ff9e9e" }, { key: "jerk", label: "Jerk", col: "#c4b3ff" }].map(f => (
              <button key={f.key} onClick={() => { setLiftFilter(f.key); setPhaseFilter("all"); setBarPathFilter(null); }} style={{
                flex: 1, padding: "10px 0", borderRadius: "8px",
                border: `2px solid ${liftFilter === f.key ? f.col : "rgba(255,255,255,0.12)"}`,
                background: liftFilter === f.key ? "rgba(255,255,255,0.15)" : "transparent",
                color: liftFilter === f.key ? f.col : "rgba(255,255,255,0.6)",
                fontSize: "13px", fontWeight: liftFilter === f.key ? 800 : 500, cursor: "pointer",
              }}>{f.label}</button>
            ))}
          </div>

          {phases.length > 0 && (
            <div style={{ display: "flex", gap: "6px", marginTop: "8px", flexWrap: "wrap" }}>
              <button onClick={() => setPhaseFilter("all")} style={{
                padding: "8px 14px", borderRadius: "7px", border: "1px solid rgba(255,255,255,0.15)",
                background: phaseFilter === "all" ? "rgba(255,255,255,0.15)" : "transparent",
                color: "#fff", fontSize: "12px", fontWeight: phaseFilter === "all" ? 700 : 400, cursor: "pointer",
              }}>All</button>
              {phases.map(p => {
                const key = p.toLowerCase();
                return (
                  <button key={key} onClick={() => setPhaseFilter(phaseFilter === key ? "all" : key)} style={{
                    padding: "8px 14px", borderRadius: "7px", border: "1px solid rgba(255,255,255,0.15)",
                    background: phaseFilter === key ? "rgba(255,255,255,0.15)" : "transparent",
                    color: "#fff", fontSize: "12px", fontWeight: phaseFilter === key ? 700 : 400, cursor: "pointer",
                  }}>{p}</button>
                );
              })}
            </div>
          )}
        </div>
      </div>

      <div style={{ maxWidth: "960px", margin: "0 auto", padding: "12px 12px 60px" }}>
        {barPathFilter && (
          <div style={{
            display: "flex", alignItems: "center", justifyContent: "space-between",
            padding: "10px 14px", background: "#e8f5ed", border: "1px solid #2c6b2c25",
            borderRadius: "8px", marginBottom: "10px",
          }}>
            <div style={{ fontSize: "12px", color: "#2c6b2c", fontWeight: 600 }}>
              Filtering: <strong>{BAR_PATH_DEVIATIONS.find(b => b.id === barPathFilter)?.label}</strong>
            </div>
            <button onClick={() => { setBarPathFilter(null); setShowBarPath(false); }} style={{
              padding: "4px 10px", borderRadius: "5px", border: "1px solid #2c6b2c40",
              background: "#fff", color: "#2c6b2c", fontSize: "11px", fontWeight: 700, cursor: "pointer",
            }}>Clear</button>
          </div>
        )}

        <button onClick={() => setShowBarPath(!showBarPath)} style={{
          width: "100%", padding: "11px 14px", borderRadius: "8px",
          border: "1px solid #2c6b2c25", background: showBarPath ? "#e8f5ed" : "#fff",
          cursor: "pointer", textAlign: "left", fontSize: "12px", fontWeight: 600, color: "#2c6b2c", marginBottom: "10px",
        }}>{showBarPath ? "▾" : "▸"} Bar Path → Error Lookup</button>

        {showBarPath && (
          <div style={{
            background: "#f0faf5", border: "1px solid #2c6b2c20", borderRadius: "10px",
            padding: "12px", marginBottom: "12px",
          }}>
            <div style={{ fontSize: "11px", color: "#666", marginBottom: "8px" }}>Tap a deviation to filter errors that cause it:</div>
            <div style={{ display: "flex", flexDirection: "column", gap: "4px" }}>
              {BAR_PATH_DEVIATIONS.map(bp => (
                <button key={bp.id} onClick={() => { setBarPathFilter(barPathFilter === bp.id ? null : bp.id); setShowBarPath(false); }}
                  className="bp-grid" style={{
                    display: "grid", gridTemplateColumns: "1fr auto 1.5fr", gap: "8px", alignItems: "center",
                    padding: "10px 12px", borderRadius: "7px", border: `1px solid ${barPathFilter === bp.id ? "#2c6b2c50" : "#dde8dd"}`,
                    background: barPathFilter === bp.id ? "#d4edda" : "#fff",
                    cursor: "pointer", textAlign: "left", width: "100%", fontSize: "12px",
                  }}>
                  <div style={{ fontWeight: 700, color: "#1a3a1a" }}>{bp.label}</div>
                  <div className="bp-phase-cell" style={{ fontWeight: 600, color: "#c0392b", fontSize: "11px", whiteSpace: "nowrap" }}>{bp.phase}</div>
                  <div style={{ color: "#555", fontSize: "11px" }}>{bp.cause}</div>
                </button>
              ))}
            </div>
          </div>
        )}

        <div style={{ fontSize: "12px", color: "#999", marginBottom: "8px", fontWeight: 500, paddingLeft: "2px" }}>
          {filteredErrors.length} error{filteredErrors.length !== 1 ? "s" : ""}{barPathFilter ? " matching bar path" : ""}
        </div>

        {filteredErrors.map(item => (
          <ErrorCard key={item.id} item={item}
            isExpanded={expandedIds.has(item.id)}
            onToggle={() => toggleExpand(item.id)}
            liftData={LIFTS[item.liftKey]} compact={compact} />
        ))}

        {filteredErrors.length === 0 && (
          <div style={{ textAlign: "center", padding: "40px 20px", color: "#999", fontSize: "14px" }}>No errors match. Try broader terms or clear filters.</div>
        )}

        <div style={{
          marginTop: "20px", padding: "12px", borderRadius: "8px", background: "#eaecf0",
          fontSize: "10px", color: "#999", textAlign: "center", lineHeight: 1.5,
        }}>
          USAW · Catalyst Athletics · Dozer · Wulf (2013) · Schutts et al. (2017) · Cunanan et al. (2020)<br/>WL Analysis · Kinovea · Built for FHSAA
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js');
  });
}
</script>
</body>
</html>
